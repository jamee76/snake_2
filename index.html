<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Mobile-first: disallow user scaling for a game canvas -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Snake Rush</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        /* prevent callouts / text selection on mobile */
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- Yandex Games SDK — must be loaded before the game module -->
    <script src="/sdk.js"></script>
    <!-- Kaplay attaches its canvas to <body> -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
